api_platform:
    title: Peinture API
    version: 1.0.0
    formats:
        jsonld: ['application/ld+json']
    docs_formats:
        jsonopenapi: ['application/vnd.openapi+json']
        html: ['text/html']
    serializer:
        hydra_prefix: true
    defaults:
        stateless: true
        pagination_enabled: false
        cache_headers:
            vary: ['Content-Type', 'Authorization', 'Origin']
